enable-magisk-update = true
parallel-jobs = 8
remove-rv-integrations-checks = true

patches-source = "Inotia00/revanced-patches"
integrations-source = "Inotia00/revanced-integrations"
rv-brand = "extended"
patches-version = "dev"
cli-version = "latest"

[YouTube]
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube/"
arch = "arm64-v8a"
build-mode = "both"
included-patches = "'MaterialYou'"
excluded-patches = "'Custom branding name for YouTube' 'Enable debug logging' 'Settings for YouTube' 'Translations for YouTube'"
patcher-args = "-OiconType=youtubeoutline -OappIcon=youtube -OchangeSplashIcon=false -OrestoreOldSplashAnimation=false -OdarkThemeBackgroundColor=#FF212121 -OoutlineIcon=true -OiconType=rounded "

[Music]
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube-music/"
arch = "arm64-v8a"
build-mode = "both"
excluded-patches = "'Custom branding name for YouTube Music' 'SponsorBlock' 'Translations for YouTube Music'"
patcher-args = "-OappIcon=youtube -OchangeSplashIcon=false -OrestoreOldSplashIcon=false "
