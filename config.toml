enable-magisk-update = true
parallel-jobs = 8
remove-rv-integrations-checks = true

patches-source = "anddea/revanced-patches"
cli-source = "j-hc/revanced-cli"

rv-brand = "ReVanced eXtended"

patches-version = "latest"
cli-version = "latest"

[YouTube]
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube/"
patches-source = "anddea/revanced-patches"
integrations-source = "anddea/revanced-integrations"
rv-brand = "Youtube eXtended"
arch = "arm64-v8a"
build-mode = "both"
included-patches = "'Custom branding icon for YouTube' 'MaterialYou'"
excluded-patches = "'Bypass image region restrictions' 'Enable debug logging' 'Force player buttons background' 'Force snackbar theme' 'Translations for YouTube'"
patcher-args = "-OappIcon=Vanced Black -OchangeSplashIcon=true -OrestoreOldSplashAnimation=true -OiconType=YouTube Outline -OiconType=Rounded -OsettingsLabel=eXtended Settings -OsettingsSummaries=Time to explore some settings -OoutlineIcon=true -OgmsCoreVendorGroupId=app.revanced -OcheckGmsCore=true -OpackageNameYouTube=app.rvx.android.apps.youtube -OpackageNameYouTubeMusic=app.rvx.android.apps.youtube.music "

[Music]
apkmirror-dlurl = "https://apkmirror.com/apk/google-inc/youtube-music/"
patches-source = "anddea/revanced-patches"
integrations-source = "anddea/revanced-integrations"
rv-brand = "Music eXtended"
arch = "arm64-v8a"
build-mode = "both"
included-patches = "'Custom branding icon for YouTube Music' 'Spoof client'"
excluded-patches = "'SponsorBlock' 'Translations for YouTube Music'"
patcher-args = "-OsettingsLabel=eXtended Settings -OsettingsSummaries=Time to explore some settings -OgmsCoreVendorGroupId=app.revanced -OcheckGmsCore=true -OpackageNameYouTube=app.rvx.android.apps.youtube -OpackageNameYouTubeMusic=app.rvx.android.apps.youtube.music -OappIcon=Vanced Black -OchangeSplashIcon=true -OrestoreOldSplashIcon=true "
